# Starship prompt configuration
# Docs: https://starship.rs/config/

# Reduce prompt delay
command_timeout = 500

# Prompt format - clean two-line layout
format = """
$directory\
$git_branch\
$git_status\
$java\
$nodejs\
$package\
$cmd_duration\
$line_break\
$character"""

[character]
success_symbol = "[>](bold green)"
error_symbol = "[>](bold red)"

[directory]
truncation_length = 4
truncate_to_repo = true
style = "bold cyan"

[git_branch]
format = "on [$symbol$branch(:$remote_branch)]($style) "
symbol = " "
style = "bold purple"

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "bold red"
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "*${count}"
modified = "!${count}"
staged = "+${count}"
deleted = "x${count}"

[java]
format = "via [$symbol($version)]($style) "
symbol = " "
style = "red"

[nodejs]
format = "via [$symbol($version)]($style) "
symbol = " "
style = "green"

[package]
format = "is [$symbol$version]($style) "
symbol = " "

[cmd_duration]
min_time = 2_000
format = "took [$duration]($style) "
style = "yellow"
